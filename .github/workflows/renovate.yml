name: Renovate

on:
  schedule:
    - cron: "0 3 * * 1"  
  
  workflow_dispatch:

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: renovatebot/github-action@v46.1.2
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}